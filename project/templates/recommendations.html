{% extends "layout.html" %}
{% block content %}
<div class="content-wrapper">
    <div class="bg-blue-600 text-white p-6 rounded-xl shadow-lg mb-8">
        <h1 class="text-3xl font-bold mb-2">Personalized Recommendations</h1>
        <p class="text-lg font-light opacity-90">Based on your quiz results, here are some courses and career paths tailored for you.</p>
    </div>

    <div id="recommendations-container" class="space-y-12">
        <p class="text-center text-gray-500">Loading recommendations...</p>
    </div>

    <div id="message-container" class="mt-6 text-center text-sm font-medium"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const recommendationsContainer = document.getElementById('recommendations-container');
        const messageContainer = document.getElementById('message-container');
        
        const fetchRecommendations = async () => {
            try {
                const response = await fetch('/api/recommendations/courses', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' },
                });
                
                const data = await response.json();
                
                if (response.ok && data.recommendations) {
                    renderRecommendations(data.recommendations);
                } else {
                    recommendationsContainer.innerHTML = '<p class="text-center text-red-500">Error fetching recommendations. Please try again later.</p>';
                    messageContainer.textContent = data.error || 'No recommendations found.';
                    console.error("API Error:", data.error);
                }
            } catch (error) {
                recommendationsContainer.innerHTML = '<p class="text-center text-red-500">An unexpected error occurred.</p>';
                console.error("Error fetching recommendations:", error);
            }
        };

        const renderRecommendations = (recommendations) => {
            if (recommendations.length === 0) {
                recommendationsContainer.innerHTML = '<p class="text-center text-gray-500">No recommendations available at this time.</p>';
                return;
            }

            recommendationsContainer.innerHTML = recommendations.map(item => `
                <div class="bg-white p-6 rounded-xl shadow-lg hover:shadow-2xl transition-shadow duration-300 transform hover:-translate-y-1">
                    <h3 class="text-xl font-bold text-gray-800 mb-2">${item.title}</h3>
                    <p class="text-gray-600 mb-4">${item.description}</p>
                    <div class="mt-4">
                        <p class="font-semibold text-gray-700 mb-1">Career Paths</p>
                        <ul class="list-disc list-inside text-sm text-gray-500">
                            ${item.career_paths.map(path => `<li>${path}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="mt-4">
                        <p class="font-semibold text-gray-700 mb-1">Relevant Exams</p>
                        <ul class="list-disc list-inside text-sm text-gray-500">
                            ${item.exams.map(exam => `<li>${exam}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `).join('');
        };
        
        fetchRecommendations();
    });
</script>
{% endblock %}
