<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Career Advisor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col justify-center items-center min-h-screen p-4">
    <div class="bg-white p-8 sm:p-12 rounded-2xl shadow-xl w-full max-w-sm text-center">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Create an Account</h1>
        <p class="text-gray-500 mb-6">Join us to start planning your future.</p>

        <div id="message-container" class="mb-4 text-sm font-medium"></div>

        <form id="signup-form" class="space-y-4">
            <div>
                <label for="name" class="sr-only">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Full Name" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors duration-200">
            </div>
            <div>
                <label for="email" class="sr-only">Email</label>
                <input type="email" id="email" name="email" placeholder="Email Address" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors duration-200">
            </div>
            <div>
                <label for="password" class="sr-only">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors duration-200">
            </div>
            <button type="submit" id="signup-button" 
                    class="w-full px-4 py-3 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 transition-colors duration-300 transform hover:scale-105">
                Sign Up
            </button>
        </form>

        <div class="mt-6 text-center text-sm">
            <a href="{{ url_for('main.page_login') }}" class="text-blue-600 hover:text-blue-800 font-semibold transition-colors duration-200">Already have an account? Log In</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('signup-form');
            const signupButton = document.getElementById('signup-button');
            const messageContainer = document.getElementById('message-container');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                signupButton.disabled = true;
                signupButton.textContent = 'Creating account...';
                messageContainer.textContent = '';

                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    const response = await fetch('/api/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password }),
                    });

                    const data = await response.json();

                    if (response.ok && data.token) {
                        // Save the token to local storage
                        localStorage.setItem('authToken', data.token);
                        
                        // Redirect to the dashboard
                        window.location.href = "{{ url_for('main.page_dashboard') }}";
                    } else {
                        messageContainer.className = 'text-red-600';
                        messageContainer.textContent = data.error || 'Sign up failed. Please try again.';
                    }
                } catch (error) {
                    messageContainer.className = 'text-red-600';
                    messageContainer.textContent = 'An unexpected error occurred. Please check your connection.';
                } finally {
                    signupButton.disabled = false;
                    signupButton.textContent = 'Sign Up';
                }
            });
        });
    </script>
</body>
</html>
