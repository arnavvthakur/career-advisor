{% extends "layout.html" %}

{% block content %}
<div class="content-wrapper">
    <div class="bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Important Dates & Deadlines</h2>
        <p class="text-gray-600 mb-6">Here is a list of upcoming registration deadlines, exam dates, and other important events.</p>
        <div id="timeline-container" class="space-y-4">
            Loading timeline...
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const timelineContainer = document.getElementById('timeline-container');

    try {
        const response = await fetchWithAuth('/api/timeline/upcoming');
        const data = await response.json();

        timelineContainer.innerHTML = ''; // Clear loading message
        if (data && data.timeline && data.timeline.length > 0) {
            const list = document.createElement('ul');
            list.className = 'divide-y divide-gray-200';

            data.timeline.forEach(event => {
                const listItem = document.createElement('li');
                listItem.className = 'py-4';
                listItem.innerHTML = `
                    <div class="flex space-x-4">
                        <div class="flex-shrink-0">
                            <div class="bg-blue-100 text-blue-600 rounded-full h-12 w-12 flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                            </div>
                        </div>
                        <div>
                            <p class="text-lg font-semibold text-gray-900">${event.title}</p>
                            <p class="text-sm text-gray-500">${event.description}</p>
                            <p class="text-sm font-medium text-gray-700 mt-1">Date: ${event.event_date}</p>
                        </div>
                    </div>
                `;
                list.appendChild(listItem);
            });
            timelineContainer.appendChild(list);

        } else {
            timelineContainer.textContent = 'You have no upcoming events.';
        }
    } catch (error) {
        console.error('Error loading timeline:', error);
        timelineContainer.innerHTML = `<div class="text-red-600">Could not load timeline data. Please try again later.</div>`;
    }
});
</script>
{% endblock %}
