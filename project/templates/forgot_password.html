<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password - Career Advisor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --background-color: #f8f9fa; --primary-accent: #0d6efd; --text-primary: #212529; --text-secondary: #6c757d; --card-bg: #ffffff; --border-color: #dee2e6; --error-color: #dc3545; --success-color: #198754;}
    body { font-family: 'Inter', sans-serif; background-color: var(--background-color); color: var(--text-primary); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .form-container { background-color: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h2 { font-size: 28px; font-weight: 600; color: var(--text-primary); margin-top: 0; margin-bottom: 24px; text-align: center; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
    input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 16px; font-family: inherit; }
    button { width: 100%; padding: 12px; border-radius: 8px; background: var(--primary-accent); color: #fff; border: none; cursor: pointer; font-size: 16px; font-weight: 600; transition: background-color 0.2s; }
    button:hover { background-color: #0b5ed7; }
    .footer-text { text-align: center; margin-top: 24px; color: var(--text-secondary); }
    .footer-text a { color: var(--primary-accent); text-decoration: none; }
    #message { text-align: center; margin-bottom: 16px; display: none; padding: 10px; border-radius: 6px; }
    #message.success { color: var(--success-color); background-color: #d1e7dd; }
    #message.error { color: var(--error-color); background-color: #f8d7da; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Reset Your Password</h2>
    <div id="message"></div>
    <form id="reset-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit">Reset Password</button>
    </form>
    <p class="footer-text">Remember your password? <a href="/login">Log In</a></p>
  </div>
  <script>
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const new_password = document.getElementById('password').value;
      const messageEl = document.getElementById('message');
      
      try {
        const response = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, new_password })
        });
        const data = await response.json();

        if (response.ok) {
          messageEl.textContent = data.message;
          messageEl.className = 'success';
          messageEl.style.display = 'block';
          document.getElementById('reset-form').reset();
        } else {
          messageEl.textContent = data.error || 'Password reset failed.';
          messageEl.className = 'error';
          messageEl.style.display = 'block';
        }
      } catch (err) {
        messageEl.textContent = 'An unexpected error occurred.';
        messageEl.className = 'error';
        messageEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
